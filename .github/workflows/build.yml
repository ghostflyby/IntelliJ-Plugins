name: Build
on:
  push:
    branches: [ main ]
  pull_request:

defaults:
  run:
    shell: pwsh

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-check:
    name: Build and Check
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false
      - name: Fetch Sources
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: jetbrains
          java-version: 21
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: Build plugin
        run: |
          $gradlew = if ($IsWindows)
          {
              ".\gradlew.bat"
          }
          else
          {
              "./gradlew"
          }
          & $gradlew --configuration-cache buildPlugin
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: plugin-distributions
          path: ${{ github.workspace }}/plugins/*/build/distributions/*.zip
          if-no-files-found: error
      - name: Run Tests
        run: |
          $gradlew = if ($IsWindows)
          {
              ".\gradlew.bat"
          }
          else
          {
              "./gradlew"
          }
          & $gradlew --configuration-cache check
      - name: Collect Tests Result
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: tests-result
          path: ${{ github.workspace }}/**/build/reports/tests
      - name: Collect Code Coverage Reports
        id: coverage
        run: |
          $reports = Get-ChildItem `
            -Path (Join-Path $env:GITHUB_WORKSPACE "plugins/*/build/reports/kover/report.xml") `
            -File `
            -ErrorAction SilentlyContinue
          if (-not $reports)
          {
              exit 0
          }
          "files=$( $reports.FullName -join ',' )" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - name: Upload Code Coverage Report
        if: ${{ steps.coverage.outputs.files != '' }}
        uses: codecov/codecov-action@v7
        with:
          files: ${{ steps.coverage.outputs.files }}
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Run Plugin Verification tasks
        run: |
          $gradlew = if ($IsWindows)
          {
              ".\gradlew.bat"
          }
          else
          {
              "./gradlew"
          }
          & $gradlew --configuration-cache verifyPlugin
      - name: Collect Plugin Verifier Result
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: pluginVerifier-result
          path: ${{ github.workspace }}/plugins/*/build/reports/pluginVerifier
      - name: Plugin Verifier Summary
        env:
          reports: ${{ github.workspace }}/plugins/*/build/reports/pluginVerifier
        run: |
          Get-ChildItem -Path $env:reports -Filter "*.md" -Recurse -File |
                  Get-Content |
                  Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
  

  inspectCode:
    name: Inspect code
    uses: ./.github/workflows/inspect-code.yml
    permissions:
      contents: write
      security-events: write
      checks: write
      pull-requests: write
    secrets:
      QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}



  releaseDraft:
    name: Release draft
    if: github.event_name == 'push'
    needs: [ build-and-check, inspectCode ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false
      - name: Fetch Sources
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: jetbrains
          java-version: 21
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: true
      - name: Create release drafts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $gradlew = if ($IsWindows)
          {
              ".\gradlew.bat"
          }
          else
          {
              "./gradlew"
          }
          $pluginPaths = & $gradlew tasks --all --console=plain -q |
                  ForEach-Object {
                      if ($_ -match "^(plugins:[^:]+):getChangelog")
                      {
                          ":$( $Matches[1] )"
                      }
                  } |
                  Sort-Object -Unique

          foreach ($pluginPath in $pluginPaths)
          {
              $tagPrefix = ($pluginPath -split ":")[-1]
              $properties = & $gradlew --configuration-cache "${pluginPath}:properties" --console=plain -q
              $versionLine = $properties | Where-Object { $_ -like "version:*" } | Select-Object -First 1
              $version = $versionLine.Substring("version:".Length).Trim()
              $changelog = (& $gradlew --configuration-cache "${pluginPath}:getChangelog" --unreleased --no-header --no-empty-sections --console=plain -q) -join [Environment]::NewLine
              
              $releaseIds = gh api "repos/{owner}/{repo}/releases" `
              --jq ".[] | select(.draft == true and (.tag_name | startswith(`"$tagPrefix-v`"))) | .id"
              foreach ($releaseId in $releaseIds)
              {
                  if ($releaseId)
                  {
                      gh api -X DELETE "repos/{owner}/{repo}/releases/$releaseId"
                  }
              }

              gh release create "$tagPrefix-v$version" `
                      --draft `
                      --title "$tagPrefix v$version" `
                      --notes "$changelog"
          }
