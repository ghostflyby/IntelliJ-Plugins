# Qodana configuration:
# https://www.jetbrains.com/help/qodana/qodana-yaml.html

version: "1.0"
projectJDK: "21"
linter: qodana-jvm-community
withinDocker: "false"
profile:
  path: .idea/inspectionProfiles/Project_Default.xml
  inspections:
    - group: ALL
      ignore:
        - "scope#$gitignore"
plugins:
  - id: DevKit
exclude:
  - name: All
    paths:
      - plugins/IdeaVimToggleIME