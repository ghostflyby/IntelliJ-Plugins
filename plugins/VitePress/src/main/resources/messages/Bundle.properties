configuration.title=VitePress
configuration.vueLsp.checkbox=Enable Vue language service workaround for .md files
configuration.vueLsp.description.html=<html><body><p>If Vue language service does not start on VitePress pages, enable this workaround.</p><p>What it does:</p><ul><li>Changes the application-wide <code>.md</code> association to Vue.</li><li>Keeps detected VitePress pages on the VitePress file type through dynamic override.</li><li>Keeps other Markdown files on the normal Markdown file type.</li></ul><p>Use this only when VitePress pages need Vue language service support.</p></body></html>
notification.group=VitePress
notification.vueLsp.title=Vue language service workaround is available for VitePress
notification.vueLsp.content.single=Detected a VitePress site root at {0}. If Vue language service does not start on VitePress Markdown files, enable the workaround. It changes the application-wide .md association to Vue and uses dynamic file type overrides to preserve normal Markdown behavior outside VitePress roots.
notification.vueLsp.content.multiple=Detected {0} VitePress site roots in this project. If Vue language service does not start on VitePress Markdown files, enable the workaround. It changes the application-wide .md association to Vue and uses dynamic file type overrides to preserve normal Markdown behavior outside VitePress roots.
notification.vueLsp.action.enable=Enable workaround
notification.vueLsp.action.settings=Open settings
